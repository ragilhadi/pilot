name: Diagnose Windows paths

on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Compare realpathSync vs realpathSync.native
        shell: pwsh
        run: |
          node -e "
            const { mkdtempSync, realpathSync, writeFileSync } = require('node:fs');
            const { execFileSync } = require('node:child_process');
            const os = require('node:os');
            const path = require('node:path');

            const dir = mkdtempSync(path.join(os.tmpdir(), 'pilot-diag-'));
            console.log('mkdtemp result:', JSON.stringify(dir));
            console.log('realpathSync(dir):', JSON.stringify(realpathSync(dir)));
            console.log('realpathSync.native(dir):', JSON.stringify(realpathSync.native(dir)));

            execFileSync('git', ['init', '-q'], { cwd: dir });
            execFileSync('git', ['config', 'user.email', 'a@b.c'], { cwd: dir });
            execFileSync('git', ['config', 'user.name', 'a'], { cwd: dir });
            writeFileSync(path.join(dir, 'f.txt'), 'pilot\n');
            execFileSync('git', ['add', '.'], { cwd: dir });
            execFileSync('git', ['commit', '-q', '-m', 'x'], { cwd: dir });

            const top = execFileSync('git', ['rev-parse', '--show-toplevel'], { cwd: dir }).toString().trim();
            const resolvedTop = path.resolve(top);
            console.log('git toplevel:', JSON.stringify(top));
            console.log('path.resolve(git toplevel):', JSON.stringify(resolvedTop));
            console.log('native === git-resolved ?', realpathSync.native(dir) === resolvedTop);
          "
