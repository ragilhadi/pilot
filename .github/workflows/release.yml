name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Enable the pinned pnpm version
        run: corepack enable

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify the release tag matches the package version
        if: github.event_name == 'release'
        run: |
          tag_version="${{ github.event.release.tag_name }}"
          tag_version="${tag_version#pilot-v}"
          pkg_version="$(node -p "require('./apps/cli/package.json').version")"
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::Release tag ${{ github.event.release.tag_name }} does not match apps/cli package version $pkg_version."
            echo "::error::Run 'pnpm release:version $tag_version', commit, and tag pilot-v$tag_version before publishing a release."
            exit 1
          fi

      - name: Check formatting, lint, and types
        run: pnpm check

      - name: Run tests
        run: pnpm test

      - name: Run deterministic MVP evaluations
        run: pnpm eval

      - name: Build packages
        run: pnpm build

      - name: Validate portable local package
        run: pnpm package:smoke

      - name: Publish to npm
        run: pnpm -r publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
