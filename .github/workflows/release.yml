name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Enable the pinned pnpm version
        run: corepack enable

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify the tag matches the package version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          pkg_version="$(node -p "require('./apps/cli/package.json').version")"
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match apps/cli package version $pkg_version."
            echo "::error::Run 'pnpm release:version $tag_version', commit, and re-tag before pushing."
            exit 1
          fi

      - name: Check formatting, lint, and types
        run: pnpm check

      - name: Run tests
        run: pnpm test

      - name: Run deterministic MVP evaluations
        run: pnpm eval

      - name: Build packages
        run: pnpm build

      - name: Validate portable local package
        run: pnpm package:smoke

      - name: Publish to npm
        run: pnpm -r publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" --generate-notes
