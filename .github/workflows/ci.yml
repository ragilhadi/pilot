name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Node ${{ matrix.node }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [22, 24]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Enable the pinned pnpm version
        run: corepack enable

      - name: Install ripgrep (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Install ripgrep (Windows)
        if: runner.os == 'Windows'
        run: choco install ripgrep -y --no-progress

      - name: Verify ripgrep is available
        run: rg --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting, lint, types, and version sync
        run: pnpm check

      - name: Run tests
        run: pnpm test

      - name: Run deterministic MVP evaluations
        run: pnpm eval

      - name: Build packages
        run: pnpm build

      - name: Validate portable local package
        run: pnpm package:smoke
